name: Docker Build

on:
  workflow_call:
    outputs:
      image-name:
        description: Docker image name
        value: ${{ jobs.build.outputs.image-name }}

      image-tag:
        description: Docker image tag
        value: ${{ jobs.build.outputs.image-tag }}

permissions:
  contents: read

env:
  IMAGE_NAME: aiops-gitops-playbook

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image-name: ${{ steps.meta.outputs.image }}
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build \
            --pull \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -t $IMAGE_NAME:${{ github.sha }} .

      - name: Verify Image
        run: docker image inspect $IMAGE_NAME:${{ github.sha }}

      - name: Export Docker Image
        run: |
          docker save $IMAGE_NAME:${{ github.sha }} \
            | gzip > docker-image.tar.gz

      - name: Generate Metadata
        id: meta
        run: |
          echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

          jq -n \
            --arg image "$IMAGE_NAME" \
            --arg tag "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "${{ github.sha }}" \
            --arg actor "${{ github.actor }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg run "${{ github.run_number }}" \
            --arg built "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
              image:$image,
              tag:$tag,
              branch:$branch,
              commit:$commit,
              actor:$actor,
              workflow:$workflow,
              run:$run,
              built_at:$built
            }' > docker-build-metadata.json

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar.gz
          retention-days: 1

      - name: Upload Build Metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: docker-build-metadata.json
