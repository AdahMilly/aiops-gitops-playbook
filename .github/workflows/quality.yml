name: Quality

on:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test -- --passWithNoTests

      - name: Create Quality Report
        run: |
          jq -n \
            --arg sha "${{ github.sha }}" \
            --arg date "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
              commit:$sha,
              timestamp:$date,
              reports:{
                lint:"lint-report.json",
                tests:"test-report.json",
                typecheck:"tsc-report.txt"
              }
            }' > quality-report.json

      - name: Upload Quality Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: |
            lint-report.json
            test-report.json
            tsc-report.txt
            quality-report.json