name: Push Image

on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: aiops-gitops-playbook
  REGISTRY: ghcr.io

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: |
          gunzip -c docker-image.tar.gz | docker load

      - name: Verify Image
        run: docker image inspect $IMAGE_NAME:${{ github.sha }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag SHA Image
        run: |
          docker tag \
            $IMAGE_NAME:${{ github.sha }} \
            $REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha }}

      - name: Push SHA Tag
        run: |
          docker push \
            $REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha }}

      - name: Push Branch Tag
        if: github.ref_name == 'develop'
        run: |
          docker tag \
            $IMAGE_NAME:${{ github.sha }} \
            $REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:develop

          docker push \
            $REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:develop

      - name: Push Latest Tag
        if: github.ref_name == 'main'
        run: |
          docker tag \
            $IMAGE_NAME:${{ github.sha }} \
            $REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:latest

          docker push \
            $REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:latest

      - name: Generate Push Metadata
        run: |
          jq -n \
            --arg image "$REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME" \
            --arg tag "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg registry "$REGISTRY" \
            --arg pushed_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
              registry: $registry,
              image: $image,
              tag: $tag,
              branch: $branch,
              pushed_at: $pushed_at
            }' > push-metadata.json

      - name: Upload Push Metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: push-metadata
          path: push-metadata.json